name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Typecheck/build only — no live DB or browsers needed at this gate.
env:
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma client
        run: npm run db:generate -w @lighthouse/api

      - name: Typecheck all workspaces
        run: |
          npm run lint -w @lighthouse/web
          npm run lint -w @lighthouse/api
          npm run lint -w @lighthouse/worker

      - name: Run tests
        run: npm test

      - name: Build web cockpit
        run: npm run build -w @lighthouse/web
