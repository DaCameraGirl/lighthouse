# Render Blueprint for Lighthouse.
# One web service (Fastify API serving the built cockpit) + one Postgres DB.
# Deploy: push to main with this file present, then in Render create a new
# Blueprint from the repo. Set ANTHROPIC_API_KEY (and optionally WEB_ORIGIN)
# in the dashboard — everything else is wired automatically.
#
# NOTE: Render's free Postgres is removed ~30 days after creation. Fine for a
# shared demo; for an always-on product, bump the db and service to a paid plan.

databases:
  - name: lighthouse-db
    plan: free
    databaseName: lighthouse
    user: lighthouse

services:
  - type: web
    name: lighthouse
    runtime: node
    plan: free
    region: oregon
    branch: main
    # --include=dev keeps vite/prisma/tsx available for the build + runtime.
    # The API runs under tsx (it imports source-only workspace packages), so
    # we build the cockpit + generate the client here; no API tsc step needed.
    # Migrate + seed run here (both idempotent) so each deploy converges to a
    # known state with the demo login present.
    buildCommand: >-
      npm install --include=dev &&
      npm run build -w @lighthouse/web &&
      npm run db:generate -w @lighthouse/api &&
      npm run db:migrate:deploy -w @lighthouse/api &&
      npm run db:seed -w @lighthouse/api
    startCommand: npm start -w @lighthouse/api
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        fromDatabase:
          name: lighthouse-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      # Same-origin in production (API serves the cockpit), so CORS is not in
      # play for normal use. Set this to the live URL if you ever split them.
      - key: WEB_ORIGIN
        sync: false
      # Optional: enables AI copy tailoring. Leave blank to run without it.
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: LIGHTHOUSE_COPY_MODEL
        value: claude-opus-4-8
