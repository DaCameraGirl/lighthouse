services:
  db:
    image: postgres:16-alpine
    container_name: lighthouse-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: lighthouse
      POSTGRES_PASSWORD: lighthouse
      POSTGRES_DB: lighthouse
    ports:
      - "5433:5432"
    volumes:
      - lighthouse_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lighthouse"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: lighthouse-redis
    restart: unless-stopped
    ports:
      - "6380:6379"

volumes:
  lighthouse_pgdata:
